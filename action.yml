name: PatchDrill
description: Generate deterministic patch verification evidence for pull requests.
author: PatchDrill contributors
inputs:
  base:
    description: Base ref to compare against.
    required: false
    default: origin/main
  fail-on:
    description: Severity threshold that should fail the action.
    required: false
    default: high
  max-risk:
    description: Maximum allowed risk score from 0 to 100.
    required: false
    default: "69"
  config:
    description: Optional PatchDrill policy path.
    required: false
    default: ""
  baseline:
    description: Optional previous PatchDrill JSON report to compare against.
    required: false
    default: ""
  run:
    description: Execute required verification commands.
    required: false
    default: "false"
  markdown:
    description: Markdown report output path.
    required: false
    default: patchdrill-report.md
  json:
    description: JSON report output path.
    required: false
    default: patchdrill-report.json
  sarif:
    description: SARIF report output path.
    required: false
    default: patchdrill.sarif
  step-summary:
    description: Append the Markdown report to the GitHub Actions step summary.
    required: false
    default: "true"
  pr-comment:
    description: Upsert the Markdown report as a pull request comment.
    required: false
    default: "false"
  comment-marker:
    description: Hidden marker used to find and update an existing PatchDrill PR comment.
    required: false
    default: "<!-- patchdrill-report -->"
outputs:
  report-json:
    description: Path to the generated JSON report.
    value: ${{ steps.paths.outputs.json }}
  report-markdown:
    description: Path to the generated Markdown report.
    value: ${{ steps.paths.outputs.markdown }}
  report-sarif:
    description: Path to the generated SARIF report.
    value: ${{ steps.paths.outputs.sarif }}
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Run PatchDrill
      id: run
      shell: bash
      run: |
        RUN_FLAG=""
        if [ "${{ inputs.run }}" = "true" ]; then
          RUN_FLAG="--run"
        fi
        CONFIG_FLAG=""
        if [ -n "${{ inputs.config }}" ]; then
          CONFIG_FLAG="--config ${{ inputs.config }}"
        fi
        BASELINE_FLAG=""
        if [ -n "${{ inputs.baseline }}" ]; then
          BASELINE_FLAG="--baseline ${{ inputs.baseline }}"
        fi
        set +e
        npx patchdrill scan \
          --base "${{ inputs.base }}" \
          --markdown "${{ inputs.markdown }}" \
          --json "${{ inputs.json }}" \
          --sarif "${{ inputs.sarif }}" \
          --fail-on "${{ inputs.fail-on }}" \
          --max-risk "${{ inputs.max-risk }}" \
          $CONFIG_FLAG \
          $BASELINE_FLAG \
          $RUN_FLAG
        STATUS=$?
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Write step summary
      if: inputs.step-summary == 'true'
      shell: bash
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "${{ inputs.markdown }}" ]; then
          cat "${{ inputs.markdown }}" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Upsert PR comment
      if: inputs.pr-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v9
      env:
        PATCHDRILL_MARKDOWN: ${{ inputs.markdown }}
        PATCHDRILL_MARKER: ${{ inputs.comment-marker }}
      with:
        script: |
          const fs = require("fs");
          const marker = process.env.PATCHDRILL_MARKER || "<!-- patchdrill-report -->";
          const markdownPath = process.env.PATCHDRILL_MARKDOWN || "patchdrill-report.md";
          if (!fs.existsSync(markdownPath)) {
            core.warning(`PatchDrill markdown report not found: ${markdownPath}`);
            return;
          }
          const body = `${marker}\n${fs.readFileSync(markdownPath, "utf8")}`;
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100
          });
          const existing = comments.find((comment) => comment.user?.type === "Bot" && comment.body?.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }
    - name: Export report paths
      id: paths
      shell: bash
      run: |
        echo "json=${{ inputs.json }}" >> "$GITHUB_OUTPUT"
        echo "markdown=${{ inputs.markdown }}" >> "$GITHUB_OUTPUT"
        echo "sarif=${{ inputs.sarif }}" >> "$GITHUB_OUTPUT"
    - name: Fail on PatchDrill gate
      if: steps.run.outputs.status != '0'
      shell: bash
      run: exit "${{ steps.run.outputs.status }}"
