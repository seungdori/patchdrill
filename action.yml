name: PatchDrill
description: Generate deterministic patch verification evidence for pull requests.
author: PatchDrill contributors
inputs:
  base:
    description: Base ref to compare against.
    required: false
    default: origin/main
  fail-on:
    description: Severity threshold that should fail the action.
    required: false
    default: high
  max-risk:
    description: Maximum allowed risk score from 0 to 100.
    required: false
    default: "69"
  config:
    description: Optional PatchDrill policy path.
    required: false
    default: ""
  run:
    description: Execute required verification commands.
    required: false
    default: "false"
  markdown:
    description: Markdown report output path.
    required: false
    default: patchdrill-report.md
  json:
    description: JSON report output path.
    required: false
    default: patchdrill-report.json
  sarif:
    description: SARIF report output path.
    required: false
    default: patchdrill.sarif
  step-summary:
    description: Append the Markdown report to the GitHub Actions step summary.
    required: false
    default: "true"
outputs:
  report-json:
    description: Path to the generated JSON report.
    value: ${{ steps.paths.outputs.json }}
  report-markdown:
    description: Path to the generated Markdown report.
    value: ${{ steps.paths.outputs.markdown }}
  report-sarif:
    description: Path to the generated SARIF report.
    value: ${{ steps.paths.outputs.sarif }}
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Run PatchDrill
      id: run
      shell: bash
      run: |
        RUN_FLAG=""
        if [ "${{ inputs.run }}" = "true" ]; then
          RUN_FLAG="--run"
        fi
        CONFIG_FLAG=""
        if [ -n "${{ inputs.config }}" ]; then
          CONFIG_FLAG="--config ${{ inputs.config }}"
        fi
        set +e
        npx patchdrill scan \
          --base "${{ inputs.base }}" \
          --markdown "${{ inputs.markdown }}" \
          --json "${{ inputs.json }}" \
          --sarif "${{ inputs.sarif }}" \
          --fail-on "${{ inputs.fail-on }}" \
          --max-risk "${{ inputs.max-risk }}" \
          $CONFIG_FLAG \
          $RUN_FLAG
        STATUS=$?
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Write step summary
      if: inputs.step-summary == 'true'
      shell: bash
      run: |
        if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f "${{ inputs.markdown }}" ]; then
          cat "${{ inputs.markdown }}" >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Export report paths
      id: paths
      shell: bash
      run: |
        echo "json=${{ inputs.json }}" >> "$GITHUB_OUTPUT"
        echo "markdown=${{ inputs.markdown }}" >> "$GITHUB_OUTPUT"
        echo "sarif=${{ inputs.sarif }}" >> "$GITHUB_OUTPUT"
    - name: Fail on PatchDrill gate
      if: steps.run.outputs.status != '0'
      shell: bash
      run: exit "${{ steps.run.outputs.status }}"
