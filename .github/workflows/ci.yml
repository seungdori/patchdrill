name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: node dist/cli.js scan --markdown patchdrill-report.md --json patchdrill-report.json --sarif patchdrill.sarif --fail-on critical
      - run: npm pack --dry-run
