name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run all release checks without publishing.
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: node dist/cli.js release-check --format json
      - name: Verify release Proof Pack smoke
        run: |
          node dist/cli.js scan \
            --evidence .patchdrill/release-evidence.json \
            --summary-markdown .patchdrill/release-summary.md \
            --markdown .patchdrill/release.md \
            --json .patchdrill/release.json \
            --sarif .patchdrill/release.sarif \
            --html .patchdrill/release-dashboard.html \
            --run \
            --fail-on critical
          node dist/cli.js verify --evidence .patchdrill/release-evidence.json
      - run: npm pack --dry-run
      - name: Verify release tag matches package.json version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$PKG_VERSION" ] && [ "$RELEASE_TAG" != "v$PKG_VERSION" ]; then
            echo "Release tag '$RELEASE_TAG' does not match package.json version '$PKG_VERSION'." >&2
            echo "Bump package.json (and CHANGELOG) so the published version and provenance tag agree." >&2
            exit 1
          fi
      - name: Upgrade npm for OIDC trusted publishing
        if: github.event_name == 'release'
        run: npm install -g npm@latest
      - name: Publish to npm with provenance
        if: github.event_name == 'release'
        run: npm publish --access public --provenance
