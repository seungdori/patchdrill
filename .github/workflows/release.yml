name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run all release checks without publishing.
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: node dist/cli.js release-check --format json
      - name: Verify release Proof Pack smoke
        run: |
          node dist/cli.js scan \
            --evidence .patchdrill/release-evidence.json \
            --summary-markdown .patchdrill/release-summary.md \
            --markdown .patchdrill/release.md \
            --json .patchdrill/release.json \
            --sarif .patchdrill/release.sarif \
            --html .patchdrill/release-dashboard.html \
            --run \
            --fail-on critical
          node dist/cli.js verify --evidence .patchdrill/release-evidence.json
      - run: npm pack --dry-run
      - name: Publish to npm with provenance
        if: github.event_name == 'release'
        run: npm publish --access public --provenance
